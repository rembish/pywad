site_name: wadlib
site_description: Python library for reading, writing, and analysing id Software WAD files
site_url: https://rembish.github.io/wadlib/
repo_url: https://github.com/rembish/wadlib
repo_name: rembish/wadlib
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Guides: guides.md
  - API Reference: api.md
  - Game Reference: games.md
  - Format Reference: formats.md

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite
